<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selection</title>
    <style>
        /* Mode Sombre */
        body {
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        .container {
            display: flex;
            gap: 50px;
        }

        /* Style des boutons */
        .choice-box {
            text-decoration: none;
            font-size: 80px;
            padding: 40px;
            border: 2px solid #333;
            border-radius: 20px;
            transition: all 0.3s ease;
            background: #1e1e1e;
        }

        /* Effet au survol */
        .choice-box:hover {
            border-color: #00ffcc;
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
        }

        /* Adaptation mobile */
        @media (max-width: 600px) {
            .container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Choix 1 : 6Stormwindsky -->
        <a href="https://www.stormwindsky.com/6Stormwindsky" class="choice-box" title="6Stormwindsky">
            ⚡
        </a>

        <!-- Choix 2 : Stormwindsky's Collection -->
        <a href="https://www.stormwindsky.com/Stormwindsky's%20Collection.html" class="choice-box" title="Collection">
            💎
        </a>
    </div>

</body>
</html>
