<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stormwindsky | Video Corruptor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f0f0f0;
            --card-white: #ffffff;
            --card-dark: #2d333b;
            --blue-main: #007aff;
            --text-dark: #1d1d1f;
            --text-dim: #86868b;
            --warn-orange: #ff9500;
        }

        [data-theme="dark"] {
            --bg-body: #0a0a0a;
            --card-white: #1c1c1e;
            --card-dark: #2c2c2e;
            --text-dark: #f5f5f7;
            --text-dim: #a1a1a6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s ease; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* MODAL WARNING */
        #warningModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            display: flex; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-content {
            background: var(--card-white); padding: 40px; border-radius: 35px;
            max-width: 550px; text-align: center; border: 3px solid var(--warn-orange);
        }

        .controls-top { display: flex; gap: 10px; margin-bottom: 20px; }
        
        select, .theme-toggle, .btn-action {
            padding: 8px 15px; border-radius: 12px; border: 1px solid var(--text-dim);
            background: var(--card-white); color: var(--text-dark); cursor: pointer;
            font-weight: 600;
        }

        .container { max-width: 900px; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .card {
            background: var(--card-white); border-radius: 30px; padding: 25px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .full-width { grid-column: span 2; }

        h1 { font-size: 1.8rem; margin-bottom: 10px; font-weight: 800; }
        label { display: block; margin: 15px 0 5px; font-size: 0.9rem; font-weight: 600; }

        input[type="range"] { width: 100%; accent-color: var(--blue-main); }

        .video-preview {
            width: 100%; aspect-ratio: 16/9; background: #000;
            border-radius: 20px; overflow: hidden; margin-top: 15px;
            display: flex; align-items: center; justify-content: center;
        }

        video { width: 100%; height: 100%; object-fit: contain; }

        .btn-main {
            background: var(--blue-main); color: white; border: none;
            padding: 12px 25px; border-radius: 12px; cursor: pointer;
            width: 100%; margin-top: 15px; font-size: 1rem; font-weight: 600;
        }

        .btn-warn { background: var(--warn-orange); color: white; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="warningModal">
        <div class="modal-content">
            <h2 style="color:var(--warn-orange); margin-bottom: 15px;" id="pop-title">⚠️ SENSORY WARNING</h2>
            <p id="pop-desc">Corrupted videos may contain <b>flashing lights</b> (Photosensitivity risk) and <b>extremely loud</b> distorted noises. Proceed with caution.</p>
            <button class="btn-main btn-warn" onclick="closeModal()" id="pop-btn">I Understand & Accept Risks</button>
        </div>
    </div>

    <div class="controls-top">
        <select id="langSelect" onchange="changeLanguage(this.value)">
            <option value="en">English</option>
            <option value="fr-FR">Français (France)</option>
            <option value="fr-CA">Français (Québec)</option>
            <option value="es-ES">Español (España)</option>
            <option value="es-AM">Español (América)</option>
        </select>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>
        <a href="welcome.html" class="btn-action" style="text-decoration: none;">🏠 Home</a>
    </div>

    <div class="container">
        <div class="card full-width">
            <h1 id="txt-title">Video Corruptor</h1>
            <p id="txt-desc">Upload an MP4 or AVI file to distort its pixels and keyframes.</p>
            <input type="file" id="videoUpload" accept="video/*" style="margin-top: 15px;">
        </div>

        <div class="card">
            <h2 id="txt-config">Configurations</h2>
            
            <label id="lbl-distort">Distortion Intensity</label>
            <input type="range" id="distortLevel" min="1" max="100" value="5">
            
            <label id="lbl-offset">Byte Offset</label>
            <input type="range" id="byteOffset" min="1000" max="5000" value="2000">

            <button class="btn-main" onclick="corruptVideo()" id="btn-process">Corrupt Video</button>
        </div>

        <div class="card">
            <h2 id="txt-preview">Video Output</h2>
            <div class="video-preview">
                <video id="videoPlayer" controls></video>
            </div>
            <a id="downloadLink" style="display:none;" class="btn-main" style="text-align: center; text-decoration: none; background: #333; margin-top: 10px;">Save Glitch Video</a>
        </div>
    </div>

    <script>
        const translations = {
            'en': {
                title: "Video Corruptor", desc: "Break video data to create aesthetic datamosh effects.",
                config: "Configurations", distort: "Distortion Intensity", offset: "Byte Offset",
                process: "Corrupt Video", preview: "Video Output",
                popT: "⚠️ SENSORY WARNING", popD: "Corrupted videos may contain flashing lights and extremely loud distorted noises. Lower your volume.", popB: "I Understand",
                themeL: "🌙 Dark Mode", themeD: "☀️ Light Mode"
            },
            'fr-FR': {
                title: "Corrupteur Vidéo", desc: "Brisez les données vidéo pour créer des effets esthétiques.",
                config: "Configurations", distort: "Intensité de Distorsion", offset: "Décalage d'octets",
                process: "Corrompre Vidéo", preview: "Sortie Vidéo",
                popT: "⚠️ ATTENTION SENSORIELLE", popD: "Les vidéos corrompues peuvent contenir des flashs lumineux et des bruits très forts. Baissez le son.", popB: "Je comprends",
                themeL: "🌙 Mode Sombre", themeD: "☀️ Mode Clair"
            },
            'fr-CA': {
                title: "Corrupteur Vidéo", desc: "Scrape ta vidéo pour faire du datamoshing maison.",
                config: "Ajustements", distort: "Force du Glitch", offset: "Saut d'octets",
                process: "Gousser la Vidéo", preview: "Résultat Vidéo",
                popT: "⚠️ ATTENTION AUX YEUX ET OREILLES", popD: "La vidéo peut avoir des flashs intenses et le son peut virer au carnage. Fais attention.", popB: "C'est beau, j'ai compris",
                themeL: "🌙 Mode Sombre", themeD: "☀️ Mode Clair"
            },
            'es-ES': {
                title: "Corruptor de Vídeo", desc: "Rompe los datos de vídeo para crear efectos visuales.",
                config: "Configuración", distort: "Intensidad de Distorsión", offset: "Desplazamiento",
                process: "Corromper Vídeo", preview: "Salida de Vídeo",
                popT: "⚠️ ADVERTENCIA SENSORIAL", popD: "Los vídeos pueden tener luces parpadeantes y ruidos fuertes. Baja el volumen.", popB: "Entiendo",
                themeL: "🌙 Modo Oscuro", themeD: "☀️ Modo Claro"
            },
            'es-AM': {
                title: "Corruptor de Video", desc: "Daña archivos de video para efectos de error digital.",
                config: "Ajustes", distort: "Intensidad", offset: "Offset de bytes",
                process: "Corromper Video", preview: "Resultado",
                popT: "⚠️ ADVERTENCIA SENSORIAL", popD: "El video puede tener luces brillantes y sonidos muy fuertes. Baja el volumen.", popB: "Entiendo",
                themeL: "🌙 Modo Oscuro", themeD: "☀️ Modo Claro"
            }
        };

        let originalVideoData = null;

        function closeModal() {
            document.getElementById('warningModal').style.display = 'none';
        }

        function changeLanguage(lang) {
            const t = translations[lang];
            document.getElementById('txt-title').innerText = t.title;
            document.getElementById('txt-desc').innerText = t.desc;
            document.getElementById('txt-config').innerText = t.config;
            document.getElementById('lbl-distort').innerText = t.distort;
            document.getElementById('lbl-offset').innerText = t.offset;
            document.getElementById('btn-process').innerText = t.process;
            document.getElementById('txt-preview').innerText = t.preview;
            document.getElementById('pop-title').innerText = t.popT;
            document.getElementById('pop-desc').innerText = t.popD;
            document.getElementById('pop-btn').innerText = t.popB;
            localStorage.setItem('preferredLang', lang);
            updateThemeButtonText();
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeButtonText();
        }

        function updateThemeButtonText() {
            const lang = localStorage.getItem('preferredLang') || 'en';
            const theme = localStorage.getItem('theme') || 'light';
            document.getElementById('themeBtn').innerText = theme === 'dark' ? translations[lang].themeD : translations[lang].themeL;
        }

        document.getElementById('videoUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => { originalVideoData = ev.target.result; };
            reader.readAsArrayBuffer(file);
        });

        function corruptVideo() {
            if (!originalVideoData) return;
            
            let bytes = new Uint8Array(originalVideoData);
            const intensity = document.getElementById('distortLevel').value / 5000;
            const skip = parseInt(document.getElementById('byteOffset').value);
            
            // Pour la vidéo, on doit sauter une grosse partie du début (le container atom)
            // Sinon le fichier devient invalide pour le navigateur.
            for (let i = skip; i < bytes.length; i++) {
                if (Math.random() < intensity) {
                    // On modifie légèrement l'octet sans détruire la structure
                    bytes[i] = (bytes[i] + Math.floor(Math.random() * 5)) % 256;
                }
            }

            const blob = new Blob([bytes], { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            const player = document.getElementById('videoPlayer');
            player.src = url;
            
            const dl = document.getElementById('downloadLink');
            dl.href = url;
            dl.download = "stormwindsky_glitch_video.mp4";
            dl.style.display = "block";
        }

        window.onload = () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            const savedLang = localStorage.getItem('preferredLang') || 'en';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('langSelect').value = savedLang;
            changeLanguage(savedLang);
        };
    </script>
</body>
</html>
