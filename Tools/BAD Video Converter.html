<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stormwindsky | Video Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

    <style>
        :root { --bg: #f0f0f0; --card: #ffffff; --blue: #007aff; --text: #1d1d1f; --dim: #86868b; }
        [data-theme="dark"] { --bg: #0a0a0a; --card: #1c1c1e; --text: #f5f5f7; --dim: #a1a1a6; }
        * { margin: 0; padding: 0; box-sizing: border-box; transition: 0.2s; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        .container { max-width: 500px; width: 100%; background: var(--card); padding: 40px; border-radius: 35px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        select, button { padding: 8px 15px; border-radius: 12px; border: 1px solid var(--dim); background: var(--card); color: var(--text); cursor: pointer; }
        #drop-zone { width: 100%; height: 180px; border: 2px dashed var(--blue); border-radius: 25px; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 20px; background: rgba(0, 122, 255, 0.02); }
        #status { font-weight: 600; margin-top: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="controls">
        <select id="langSelect" onchange="changeLanguage(this.value)">
            <option value="en">English</option>
            <option value="fr-FR">Français</option>
            <option value="fr-CA">Québécois</option>
            <option value="es-ES">Español</option>
        </select>
        <button onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>
    </div>

    <div class="container">
        <h1 id="txt-title" style="margin-bottom: 10px;">Converter</h1>
        <div id="drop-zone"><b id="txt-drop">CLICK OR DROP MP4</b></div>
        <input type="file" id="file-input" accept=".mp4" style="display: none;">
        <div id="status">Status: Initializing...</div>
    </div>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;

        // CONFIGURATION CRUCIALE : On désactive explicitement le multi-threading
        const ffmpeg = createFFmpeg({ 
            log: true,
            corePath: 'https://unpkg.com/@ffmpeg/core-st@0.11.1/dist/ffmpeg-core.js',
            mainName: 'main' // Force l'utilisation du point d'entrée standard, pas le proxy
        });

        const translations = {
            'en': { title: "Converter", drop: "CLICK OR DROP MP4", ready: "Status: Ready", working: "Converting...", done: "DONE!", themeL: "🌙 Dark", themeD: "☀️ Light" },
            'fr-FR': { title: "Convertisseur", drop: "CLIQUER OU GLISSER", ready: "Statut : Prêt", working: "Conversion...", done: "TERMINÉ !", themeL: "🌙 Sombre", themeD: "☀️ Clair" },
            'fr-CA': { title: "Convertisseur", drop: "GOSSE TON MP4 ICI", ready: "Statut : Prêt", working: "On lâche pas...", done: "C'EST FAIT !", themeL: "🌙 Sombre", themeD: "☀️ Clair" },
            'es-ES': { title: "Convertidor", drop: "ARRASTRA EL MP4", ready: "Estado: Listo", working: "Convirtiendo...", done: "¡LISTO!", themeL: "🌙 Oscuro", themeD: "☀️ Claro" }
        };

        function updateStatus(txt, color = "var(--text)") {
            const s = document.getElementById('status');
            s.innerText = txt; s.style.color = color;
        }

        document.getElementById('drop-zone').onclick = () => document.getElementById('file-input').click();

        document.getElementById('file-input').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const lang = localStorage.getItem('preferredLang') || 'en';
            
            updateStatus(translations[lang].working, "var(--blue)");

            try {
                if (!ffmpeg.isLoaded()) await ffmpeg.load();

                ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));

                // Paramètres de conversion
                await ffmpeg.run('-i', 'input.mp4', '-s', '120x100', '-r', '24', '-b:v', '32k', '-ac', '1', '-b:a', '8k', 'output.mp4');

                const data = ffmpeg.FS('readFile', 'output.mp4');
                const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                const a = document.createElement('a');
                a.href = url;
                a.download = file.name.replace(".mp4", "_lowres.mp4");
                a.click();

                updateStatus(translations[lang].done, "#2ECC71");
            } catch (err) {
                console.error(err);
                updateStatus("Error: Core conflict", "#FF5555");
            }
        };

        // --- THEME & LANG ---
        function toggleTheme() {
            const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            updateThemeButtonText();
        }

        function updateThemeButtonText() {
            const lang = localStorage.getItem('preferredLang') || 'en';
            const theme = localStorage.getItem('theme') || 'light';
            document.getElementById('themeBtn').innerText = theme === 'dark' ? translations[lang].themeD : translations[lang].themeL;
        }

        function changeLanguage(lang) {
            localStorage.setItem('preferredLang', lang);
            document.getElementById('txt-title').innerText = translations[lang].title;
            document.getElementById('txt-drop').innerText = translations[lang].drop;
            updateThemeButtonText();
            if(ffmpeg.isLoaded()) updateStatus(translations[lang].ready);
        }

        window.onload = async () => {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
            const lang = localStorage.getItem('preferredLang') || 'en';
            document.getElementById('langSelect').value = lang;
            changeLanguage(lang);

            try {
                await ffmpeg.load();
                updateStatus(translations[lang].ready);
            } catch(e) {
                updateStatus("Fail: Browser Isolation", "#FF5555");
            }
        };
    </script>
</body>
</html>
