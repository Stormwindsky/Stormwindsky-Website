<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Painting Kit - Editor</title>
    <style>
        /* --- VARIABLES SYNCHRONISÉES AVEC STORMWINDSKY.COM --- */
        :root {
            --bg-body: #f0f0f0;
            --card-bg: #ffffff;
            --text-main: #1d1d1f;
            --accent: #3c8527; /* Minecraft Green */
            --radius: 24px;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] {
            --bg-body: #0a0a0a;
            --card-bg: #1c1c1e;
            --text-main: #f5f5f7;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg-body); 
            color: var(--text-main); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }

        .panel { 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: var(--radius); 
            box-shadow: var(--shadow);
            max-width: 600px;
            width: 100%;
        }

        .controls { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 20px; 
            flex-wrap: wrap; 
            background: var(--bg-body); 
            padding: 15px; 
            border-radius: 15px; 
            align-items: center; 
            justify-content: center; 
        }

        .canvas-wrapper { 
            position: relative; 
            border: 5px solid #000; 
            line-height: 0; 
            background: black;
            margin: 0 auto;
            width: fit-content;
            border-radius: 8px;
            overflow: hidden;
        }

        canvas { image-rendering: pixelated; cursor: crosshair; max-width: 100%; height: auto; }

        .btn { 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 12px 25px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.2s; 
        }
        .btn:hover { filter: brightness(1.1); transform: scale(1.02); }
        .btn-export { background: #007aff; }

        .control-group { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        input[type="color"] { border: none; width: 35px; height: 35px; cursor: pointer; background: none; }
        label { font-size: 0.75rem; font-weight: bold; text-transform: uppercase; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="panel">
        <h2 id="ui-title" style="margin-top:0; text-align: center;">Minecraft Painting Editor</h2>
        
        <div class="controls">
            <div class="control-group">
                <label id="lbl-violet">Violet</label>
                <input type="color" id="colorViolet" value="#c372ff">
            </div>
            <div class="control-group">
                <label id="lbl-rose">Rose</label>
                <input type="color" id="colorRose" value="#d896ff">
            </div>
            <div class="control-group">
                <label id="lbl-wood">Wood</label>
                <input type="color" id="colorWood" value="#705030">
            </div>
            <div class="control-group">
                <label>Pixelize</label>
                <input type="checkbox" id="pixelizeCheck" checked>
            </div>
            <button class="btn btn-export" id="btn-export" onclick="exportPainting()">💾 EXPORT KZ.PNG</button>
        </div>

        <div class="canvas-wrapper">
            <canvas id="mainCanvas"></canvas>
        </div>
        <input type="file" id="imageUploader" hidden accept="image/*">
        
        <div id="ui-instructions" style="margin-top: 20px; text-align: center; opacity: 0.6; font-size: 0.85em;">
            <p>• Click <b>Black Zones</b> to add paintings.<br>
            • Click the <b>Top-Right Zone</b> for wood texture.</p>
        </div>
    </div>

    <script>
        // --- SYNCHRONISATION SYSTÈME ---
        const translations = {
            en: {
                title: "Minecraft Painting Editor",
                violet: "Violet", rose: "Pink", wood: "Wood",
                export: "💾 EXPORT KZ.PNG",
                instr: "• Click <b>Black Zones</b> to add paintings.<br>• Click the <b>Top-Right Zone</b> for wood texture."
            },
            fr: {
                title: "Éditeur de Tableaux Minecraft",
                violet: "Violet", rose: "Rose", wood: "Bois",
                export: "💾 EXPORTER KZ.PNG",
                instr: "• Cliquez sur les <b>zones noires</b> pour ajouter des images.<br>• Zone <b>en haut à droite</b> pour la texture du bois."
            }
        };

        function syncWithMainSite() {
            // Sync Theme
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);

            // Sync Language (Default English)
            const savedLang = localStorage.getItem('preferredLang') || 'en';
            const isFr = savedLang.startsWith('fr');
            const t = isFr ? translations.fr : translations.en;

            document.getElementById('ui-title').innerText = t.title;
            document.getElementById('lbl-violet').innerText = t.violet;
            document.getElementById('lbl-rose').innerText = t.rose;
            document.getElementById('lbl-wood').innerText = t.wood;
            document.getElementById('btn-export').innerText = t.export;
            document.getElementById('ui-instructions').innerHTML = t.instr;
        }

        // --- LOGIQUE DE L'ÉDITEUR (Inchangée mais intégrée) ---
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const uploader = document.getElementById('imageUploader');
        
        const SZ = 16; 
        canvas.width = 256; canvas.height = 256;
        canvas.style.width = "512px"; 

        const paintings = [
            [0,0,1,1], [1,0,1,1], [2,0,1,1], [3,0,1,1], [4,0,1,1], [5,0,1,1], [6,0,1,1], 
            [0,2,1,1], [1,2,1,1], [2,2,1,1], [3,2,1,1], [4,2,1,1], [5,2,1,1], [6,2,1,1], 
            [0,4,1,2], [12,4,4,3], [12,7,4,3], [0,6,4,2], 
            [0,8,2,2], [2,8,2,2], [4,8,2,2], [6,8,2,2], 
            [0,12,4,4], [4,12,4,4], [8,12,4,4], [12,0,4,3] 
        ];

        let activeZone = null;

        function renderBase() {
            const vCol = document.getElementById('colorViolet').value;
            const rCol = document.getElementById('colorRose').value;
            const wCol = document.getElementById('colorWood').value;

            for (let y = 0; y < 16; y++) {
                for (let x = 0; x < 16; x++) {
                    ctx.fillStyle = (x + y) % 2 === 0 ? vCol : rCol;
                    ctx.fillRect(x * SZ, y * SZ, SZ, SZ);
                }
            }
            ctx.fillStyle = wCol;
            ctx.fillRect(12 * SZ, 0, 4 * SZ, 3 * SZ);
            ctx.fillStyle = "black";
            paintings.forEach((p, index) => {
                if(index < paintings.length - 1) ctx.fillRect(p[0] * SZ, p[1] * SZ, p[2] * SZ, p[3] * SZ);
            });
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mouseX = (e.clientX - rect.left) * scaleX;
            const mouseY = (e.clientY - rect.top) * scaleY;

            activeZone = paintings.find(p => {
                return mouseX >= p[0]*SZ && mouseX < (p[0]+p[2])*SZ &&
                       mouseY >= p[1]*SZ && mouseY < (p[1]+p[3])*SZ;
            });
            if (activeZone) uploader.click();
        });

        uploader.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file || !activeZone) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    ctx.imageSmoothingEnabled = !document.getElementById('pixelizeCheck').checked;
                    ctx.drawImage(img, activeZone[0]*SZ, activeZone[1]*SZ, activeZone[2]*SZ, activeZone[3]*SZ);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function exportPainting() {
            const link = document.createElement('a');
            link.download = 'kz.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        document.getElementById('colorViolet').addEventListener('input', renderBase);
        document.getElementById('colorRose').addEventListener('input', renderBase);
        document.getElementById('colorWood').addEventListener('input', renderBase);

        // Initialisation
        window.onload = () => {
            syncWithMainSite();
            renderBase();
        };

        // Écouter si l'utilisateur change le thème/langue dans un autre onglet
        window.addEventListener('storage', syncWithMainSite);
    </script>
</body>
</html>
