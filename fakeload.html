<!DOCTYPE html>
<html lang="zxx" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stormwindsky | Loading</title>
    <style>
        /* --- SYSTÈME DE THÈME SYNCHRONISÉ --- */
        :root {
            --bg-body: #f0f0f0;
            --accent-color: #007aff; /* Bleu signature Stormwindsky */
            --ring-border: #86868b;
            --text-main: #1d1d1f;
        }

        [data-theme="dark"] {
            --bg-body: #0a0a0a;
            --accent-color: #0a84ff;
            --ring-border: #444446;
            --text-main: #f5f5f7;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-body);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', -apple-system, monospace;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        #loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.6s ease-out;
        }

        .ring {
            width: 50px;
            height: 50px;
            border: 3px solid var(--ring-border);
            border-radius: 50%;
            border-top-color: var(--accent-color);
            animation: rot 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            margin-bottom: 15px;
        }

        #pct {
            color: var(--text-main);
            font-size: 1.2rem;
            font-weight: bold;
        }

        @keyframes rot {
            to { transform: rotate(360deg); }
        }

        .done #loader {
            opacity: 0;
        }

        .success-icon {
            position: absolute;
            font-size: 3rem;
            color: var(--accent-color);
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .done .success-icon {
            opacity: 1;
            transform: scale(1);
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="ring"></div>
        <div id="pct">0%</div>
    </div>

    <div class="success-icon">➔</div>

    <script>
        // Synchronisation du thème avec le localStorage (utilisé par le Notepad/Collection)
        const applyTheme = () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        };

        const target = "https://www.stormwindsky.com/Your Choice.html";
        const pct = document.getElementById('pct');
        let val = 0;

        const update = () => {
            val += Math.floor(Math.random() * 12) + 1;
            if (val >= 100) {
                val = 100;
                pct.innerText = "100%";
                document.body.classList.add('done');
                setTimeout(() => {
                    window.location.href = target;
                }, 800);
            } else {
                pct.innerText = val + "%";
                setTimeout(update, Math.random() * 300);
            }
        };

        // Initialisation
        applyTheme();
        update();
    </script>
</body>
</html>
