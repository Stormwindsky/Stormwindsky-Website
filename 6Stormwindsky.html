<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6Stormwindsky</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* --- BENTO UI SYSTEM --- */
        :root {
            --bg-body: #f0f0f0;
            --card-white: #ffffff;
            --text-dark: #1d1d1f;
            --text-dim: #86868b;
            --blue-main: #007aff;
            --radius: 24px;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] {
            --bg-body: #0a0a0a;
            --card-white: #1c1c1e;
            --text-dark: #f5f5f7;
            --text-dim: #a1a1a6;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-dark);
            margin: 0; padding: 20px;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header {
            background: var(--card-white);
            padding: 15px 30px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 1.5rem;
            font-weight: bold;
        }

        #logo-digit {
            display: inline-block;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .flip-to-9 { transform: rotate(180deg); }

        .nav-controls { display: flex; gap: 10px; align-items: center; }

        select, .theme-btn {
            padding: 8px 15px; border-radius: 12px; border: 1px solid var(--text-dim);
            background: var(--card-white); color: var(--text-dark); cursor: pointer;
            font-weight: 600; outline: none; transition: 0.3s;
        }

        .tabs {
            display: flex; gap: 10px; justify-content: center;
            margin-bottom: 30px; flex-wrap: wrap;
        }

        .tab {
            padding: 12px 20px; background: var(--card-white);
            border-radius: 100px; cursor: pointer; font-weight: 600;
            box-shadow: var(--shadow); transition: 0.3s;
            color: var(--text-dark);
            border: none;
        }

        .tab.active { background: var(--blue-main); color: white; }

        #results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .bento-card {
            background: var(--card-white);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease;
        }

        /* --- VIDEO POPUP (LOCKED & LOOPED) --- */
        #malware-popup {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; max-width: 800px;
            background: black;
            z-index: 9999;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(255,0,0,0.5);
        }

        .video-container { 
            position: relative; 
            padding-bottom: 56.25%; 
            height: 0; 
            background: #000;
        }

        .video-container::after {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            background: transparent;
            pointer-events: auto;
        }

        .video-container iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }

        #alert-banner {
            padding: 15px; 
            color: var(--text-dark); 
            text-align: center; 
            background: var(--card-white); 
            font-weight: bold;
            border-top: 2px solid #ce1126;
        }

        .overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 9998;
        }

        footer { margin-top: 50px; text-align: center; color: var(--text-dim); font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closePopup()"></div>
<div id="malware-popup">
    <div class="video-container">
        <iframe 
            id="yt-player"
            src="" 
            frameborder="0" 
            allow="autoplay; encrypted-media" 
            allowfullscreen>
        </iframe>
    </div>
    <div id="alert-banner"></div>
</div>

<div class="container">
    <header>
        <div class="logo-container" onclick="triggerTransition()">
            <span id="logo-digit">6</span>Stormwindsky
        </div>
        <div class="nav-controls">
            <select id="langSelect" onchange="changeLanguage(this.value)">
                <option value="en">English</option>
                <option value="fr-FR">Français (FR)</option>
                <option value="fr-CA">Français (QC)</option>
                <option value="es-ES">Español</option>
            </select>
            <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
        </div>
    </header>

    <div class="tabs" id="category-tabs">
        <div class="tab active" data-path="ModsAndModPacks" id="tab-mods">Mods</div>
        <div class="tab" data-path="ResourcesPacksAndShadersAndMore/Minecraft (Java)/ResourcePacks" id="tab-rp">Resource Pack</div>
        <div class="tab" data-path="ResourcesPacksAndShadersAndMore/Minecraft (Java)/Datapacks" id="tab-dp">Datapack</div>
        <div class="tab" data-path="ResourcesPacksAndShadersAndMore/Minecraft (Java)/Scripts" id="tab-scripts">Scripts</div>
        <div class="tab" data-path="ResourcesPacksAndShadersAndMore/Minecraft (Java)/Maps" id="tab-maps">Maps</div>
        <div class="tab" data-path="ResourcesPacksAndShadersAndMore/Minecraft (Java)/Shaders" id="tab-shaders">Shaders</div>
    </div>

    <div id="results-grid"></div>

    <footer>
        <p id="txt-footer">Data from Stormwindsky GitHub API</p>
    </footer>
</div>

<script>
    const translations = {
        en: {
            alert: "⚠️ ALERT: Avoid 9minecraft and similar sites!",
            loading: "Loading...",
            error: "Error loading files.",
            noItems: "No items found.",
            download: "Download",
            footer: "Data retrieved from Stormwindsky GitHub API",
            themeL: "☀️ Light Mode",
            themeD: "🌙 Dark Mode",
            tabMods: "Mods",
            tabRP: "Resource Packs",
            tabDP: "Datapacks",
            tabScripts: "Scripts",
            tabMaps: "Maps",
            tabShaders: "Shaders"
        },
        "fr-FR": {
            alert: "⚠️ ALERTE : Évitez 9minecraft et les sites similaires !",
            loading: "Chargement...",
            error: "Erreur de chargement.",
            noItems: "Aucun élément trouvé.",
            download: "Télécharger",
            footer: "Données récupérées via l'API GitHub de Stormwindsky",
            themeL: "☀️ Mode Clair",
            themeD: "🌙 Mode Sombre",
            tabMods: "Mods",
            tabRP: "Packs de Textures",
            tabDP: "Datapacks",
            tabScripts: "Scripts",
            tabMaps: "Cartes",
            tabShaders: "Shaders"
        },
        "fr-CA": {
            alert: "⚠️ ALERTE : Évitez 9minecraft et les sites de ce genre !",
            loading: "Téléchargement...",
            error: "Erreur lors du chargement.",
            noItems: "Rien trouvé.",
            download: "Télécharger",
            footer: "Données de l'API GitHub de Stormwindsky",
            themeL: "☀️ Mode Clair",
            themeD: "🌙 Mode Sombre",
            tabMods: "Mods",
            tabRP: "Packs de Ressources",
            tabDP: "Datapacks",
            tabScripts: "Scripts",
            tabMaps: "Maps",
            tabShaders: "Shaders"
        },
        "es-ES": {
            alert: "⚠️ ALERTA: ¡Evita 9minecraft y sitios similares!",
            loading: "Cargando...",
            error: "Error al cargar archivos.",
            noItems: "No se encontraron artículos.",
            download: "Descargar",
            footer: "Datos obtenidos de la API de GitHub de Stormwindsky",
            themeL: "☀️ Modo Claro",
            themeD: "🌙 Modo Oscuro",
            tabMods: "Mods",
            tabRP: "Paquetes de Recursos",
            tabDP: "Datapacks",
            tabScripts: "Scripts",
            tabMaps: "Mapas",
            tabShaders: "Shaders"
        },
        "de-DE": {
            alert: "⚠️ WARNUNG: Meiden Sie 9minecraft und ähnliche Seiten!",
            loading: "Laden...",
            error: "Fehler beim Laden.",
            noItems: "Keine Einträge gefunden.",
            download: "Herunterladen",
            footer: "Daten von der Stormwindsky GitHub API",
            themeL: "☀️ Hellen Modus",
            themeD: "🌙 Dunkler Modus",
            tabMods: "Mods",
            tabRP: "Ressourcenpakete",
            tabDP: "Datapacks",
            tabScripts: "Skripte",
            tabMaps: "Karten",
            tabShaders: "Shader"
        }
    };

    let currentCategory = "ModsAndModPacks";

    // --- SYNC & LANG LOGIC ---
    function changeLanguage(lang) {
        const t = translations[lang] || translations.en;
        document.getElementById('alert-banner').innerText = t.alert;
        document.getElementById('txt-footer').innerText = t.footer;
        
        // Tabs translations
        document.getElementById('tab-mods').innerText = t.tabMods;
        document.getElementById('tab-rp').innerText = t.tabRP;
        document.getElementById('tab-dp').innerText = t.tabDP;
        document.getElementById('tab-scripts').innerText = t.tabScripts;
        document.getElementById('tab-maps').innerText = t.tabMaps;
        document.getElementById('tab-shaders').innerText = t.tabShaders;
        
        localStorage.setItem('preferredLang', lang);
        updateThemeButtonText();
        fetchMinecraftData(); // Refresh grid with new text
    }

    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateThemeButtonText();
    }

    function updateThemeButtonText() {
        const lang = localStorage.getItem('preferredLang') || 'en';
        const theme = localStorage.getItem('theme') || 'dark';
        const t = translations[lang] || translations.en;
        document.getElementById('themeBtn').innerText = theme === 'dark' ? t.themeD : t.themeL;
    }

    // --- POPUP LOGIC ---
    function triggerTransition() {
        const digit = document.getElementById('logo-digit');
        const lang = localStorage.getItem('preferredLang') || 'en';
        digit.classList.add('flip-to-9');
        document.getElementById('alert-banner').innerText = translations[lang].alert;

        setTimeout(() => {
            digit.innerText = "9";
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('malware-popup').style.display = 'block';
            const videoId = "wyJO7aZldEA";
            document.getElementById('yt-player').src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&loop=1&playlist=${videoId}&controls=0&modestbranding=1`;
        }, 600);
    }

    function closePopup() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('malware-popup').style.display = 'none';
        document.getElementById('yt-player').src = "";
        const digit = document.getElementById('logo-digit');
        digit.classList.remove('flip-to-9');
        digit.innerText = "6";
    }

    // --- GITHUB API DATA ---
    async function fetchMinecraftData() {
        const grid = document.getElementById('results-grid');
        const lang = localStorage.getItem('preferredLang') || 'en';
        const t = translations[lang];
        grid.innerHTML = `<p>${t.loading}</p>`;

        try {
            const repoApi = "https://api.github.com/repos/Stormwindsky/OeuvreLibre/git/trees/main?recursive=1";
            const res = await fetch(repoApi);
            const data = await res.json();
            
            const items = data.tree.filter(item => 
                item.path.includes(currentCategory) && item.type === "blob"
            );

            renderGrid(items, t);
        } catch (e) {
            grid.innerHTML = `<p>${t.error}</p>`;
        }
    }

    function renderGrid(items, t) {
        const grid = document.getElementById('results-grid');
        grid.innerHTML = items.length ? '' : `<p>${t.noItems}</p>`;
        
        items.forEach(item => {
            const fileName = item.path.split('/').pop();
            const card = document.createElement('div');
            card.className = 'bento-card';
            card.innerHTML = `
                <i class="fas fa-file-archive" style="font-size:2rem; color:var(--blue-main)"></i>
                <h3 style="font-size:1rem; margin:15px 0 5px 0">${fileName}</h3>
                <p style="font-size:0.8rem; color:var(--text-dim)">${item.path.split('/').slice(-2, -1)}</p>
                <a href="https://github.com/Stormwindsky/OeuvreLibre/blob/main/${item.path}" target="_blank" style="text-decoration:none; color:var(--blue-main); font-weight:bold; font-size:0.9rem;">${t.download}</a>
            `;
            grid.appendChild(card);
        });
    }

    // --- EVENTS ---
    document.querySelectorAll('.tab[data-path]').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentCategory = tab.dataset.path;
            fetchMinecraftData();
        });
    });

    window.onload = () => {
        // Sync Theme
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        
        // Sync Lang
        const savedLang = localStorage.getItem('preferredLang') || 'en';
        document.getElementById('langSelect').value = savedLang;
        changeLanguage(savedLang);
    };
</script>

</body>
</html>
