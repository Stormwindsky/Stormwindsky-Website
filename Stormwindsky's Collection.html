<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StormExplorer | Collection</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* --- BENTO UI SYSTEM --- */
        :root {
            --bg-body: #f0f0f0;
            --card-white: #ffffff;
            --card-dark: #2d333b;
            --blue-main: #007aff;
            --text-dark: #1d1d1f;
            --text-dim: #86868b;
            --radius: 24px;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            --ai-blue: #87CEEB; /* Bleu ciel pour l'IA */
        }

        [data-theme="dark"] {
            --bg-body: #0a0a0a;
            --card-white: #1c1c1e;
            --card-dark: #2c2c2e;
            --text-dark: #f5f5f7;
            --text-dim: #a1a1a6;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-dark);
            margin: 0; padding: 20px;
            transition: all 0.3s ease;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        /* Header Bento */
        header {
            background: var(--card-white);
            padding: 15px 30px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .nav-controls { display: flex; gap: 10px; align-items: center; }

        select, .theme-btn, .ai-toggle-btn {
            padding: 8px 15px; border-radius: 12px; border: 1px solid var(--text-dim);
            background: var(--card-white); color: var(--text-dark); cursor: pointer;
            font-weight: 600; outline: none; transition: 0.3s;
        }

        .ai-toggle-btn.inactive { background: #ccc; color: #666; border-color: #999; }
        .ai-toggle-btn.active { background: var(--ai-blue); color: white; border-color: var(--ai-blue); }

        /* Search Section */
        .search-section {
            background: var(--card-white);
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 25px;
            text-align: center;
        }

        .search-bar {
            display: flex; background: var(--bg-body);
            max-width: 600px; margin: 0 auto;
            padding: 12px 20px; border-radius: 100px;
            align-items: center;
        }

        .search-bar input {
            border: none; background: transparent; width: 100%;
            padding: 10px; font-size: 1.1rem; color: var(--text-dark); outline: none;
        }

        /* Tabs */
        .tabs {
            display: flex; gap: 10px; justify-content: center;
            margin-bottom: 30px; flex-wrap: wrap;
        }

        .tab {
            padding: 12px 24px; background: var(--card-white);
            border-radius: 100px; cursor: pointer; font-weight: 600;
            box-shadow: var(--shadow); transition: 0.3s;
        }

        .tab.active { background: var(--blue-main); color: white; border-color: var(--blue-main); }

        /* Bento Grid */
        #results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            grid-auto-rows: minmax(180px, auto);
            gap: 20px;
        }

        .bento-card {
            background: var(--card-white);
            border-radius: var(--radius);
            padding: 25px;
            box-shadow: var(--shadow);
            transition: 0.3s;
            display: flex; flex-direction: column; justify-content: space-between;
            position: relative;
        }

        .bento-card:hover { transform: translateY(-5px); }

        .media-preview { width: 100%; border-radius: 15px; margin-bottom: 15px; object-fit: cover; }
        
        .ai-badge {
            background: var(--ai-blue);
            color: white;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 0.8rem;
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        footer { margin-top: 50px; text-align: center; color: var(--text-dim); font-size: 0.9rem; }

        /* Popups Styling */
        #cc0-popup, #ai-readme-popup {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--card-white);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 350px;
            z-index: 1000;
            border: 2px solid var(--blue-main);
            animation: slideIn 0.5s ease-out;
        }

        #ai-readme-popup { border-color: var(--ai-blue); max-height: 400px; overflow-y: auto; }

        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .cc0-close, .ai-close { float: right; cursor: pointer; color: var(--text-dim); font-weight: bold; }
        .ai-close { color: red; font-size: 1.5rem; line-height: 1; }
    </style>
</head>
<body>

<div id="cc0-popup">
    <span class="cc0-close" onclick="closePopup()">&times;</span>
    <p id="cc0-text"></p>
    <a id="cc0-link" href="https://github.com/Stormwindsky/OeuvreLibre" target="_blank" style="color:var(--blue-main); font-weight:bold;">GitHub License</a>
</div>

<div id="ai-readme-popup">
    <span class="ai-close" onclick="closeAiPopup()">X</span>
    <div id="ai-readme-content" style="font-size: 0.9rem; white-space: pre-wrap; margin-top: 10px;">Loading...</div>
</div>

<div class="container">
    <header>
        <h2 id="txt-site-title" style="margin:0">StormExplorer</h2>
        <div class="nav-controls">
            <!-- AI Toggle Button -->
            <button id="aiToggleBtn" class="ai-toggle-btn inactive" onclick="toggleAI()">Show AI Creations</button>
            
            <select id="langSelect" onchange="changeLanguage(this.value)">
                <option value="en">English</option>
                <option value="fr-FR">Français (FR)</option>
                <option value="fr-CA">Français (QC)</option>
                <option value="es-ES">Español</option>
            </select>
            <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
        </div>
    </header>

    <section class="search-section">
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search assets...">
        </div>
    </section>

    <div class="tabs">
        <div class="tab active" data-mode="files" id="tab-files">Files</div>
        <div class="tab" data-mode="images" id="tab-images">Images</div>
        <div class="tab" data-mode="audios" id="tab-audios">Audios</div>
        <div class="tab" data-mode="videos" id="tab-videos">Videos</div>
    </div>

    <div id="results-grid"></div>

    <footer>
        <p id="txt-footer">Data from Stormwindsky GitHub API</p>
    </footer>
</div>

<script>
    const translations = {
        en: {
            siteTitle: "StormExplorer",
            searchPlh: "Search assets...",
            tabFiles: "Files",
            tabImages: "Images",
            tabAudios: "Audios",
            tabVideos: "Videos",
            footer: "Data retrieved from Stormwindsky GitHub API",
            themeL: "☀️ Light Mode",
            themeD: "🌙 Dark Mode",
            cc0: "All assets in this category are under CC0 1.0 Universal License.",
            aiBtn: "Show AI Creations"
        },
        "fr-FR": {
            siteTitle: "StormExplorer",
            searchPlh: "Rechercher des assets...",
            tabFiles: "Fichiers",
            tabImages: "Images",
            tabAudios: "Audios",
            tabVideos: "Vidéos",
            footer: "Données récupérées via l'API GitHub de Stormwindsky",
            themeL: "☀️ Mode Clair",
            themeD: "🌙 Mode Sombre",
            cc0: "Toutes les œuvres de cette catégorie sont sous licence CC0 1.0 universelle.",
            aiBtn: "Afficher Créations IA"
        },
        "fr-CA": {
            siteTitle: "StormExplorer",
            searchPlh: "Rechercher des assets...",
            tabFiles: "Fichiers",
            tabImages: "Images",
            tabAudios: "Audios",
            tabVideos: "Vidéos",
            footer: "Données récupérées via l'API GitHub de Stormwindsky",
            themeL: "☀️ Mode Clair",
            themeD: "🌙 Mode Sombre",
            cc0: "Toutes les œuvres de cette catégorie sont sous licence CC0 1.0 universelle.",
            aiBtn: "Voir Créations IA"
        },
        "es-ES": {
            siteTitle: "StormExplorer",
            searchPlh: "Buscar activos...",
            tabFiles: "Archivos",
            tabImages: "Imágenes",
            tabAudios: "Audios",
            tabVideos: "Videos",
            footer: "Datos obtenidos de la API de GitHub de Stormwindsky",
            themeL: "☀️ Modo Claro",
            themeD: "🌙 Modo Oscuro",
            cc0: "Todas las obras de esta catégorie están bajo la licencia CC0 1.0 Universal.",
            aiBtn: "Mostrar Creaciones IA"
        }
    };

    let currentMode = 'files';
    let showAI = false;
    const RAW_BASE = "https://raw.githubusercontent.com/Stormwindsky/ArtLibre/main/";

    function updateURL() {
        const query = document.getElementById('searchInput').value;
        const url = new URL(window.location);
        url.searchParams.set('mode', currentMode);
        if(query) url.searchParams.set('q', query);
        else url.searchParams.delete('q');
        window.history.replaceState({}, '', url);
    }

    function closePopup() {
        document.getElementById('cc0-popup').style.display = 'none';
    }

    function closeAiPopup() {
        document.getElementById('ai-readme-popup').style.display = 'none';
    }

    // Toggle AI Function
    async function toggleAI() {
        showAI = !showAI;
        const btn = document.getElementById('aiToggleBtn');
        const popup = document.getElementById('ai-readme-popup');
        
        if(showAI) {
            btn.classList.replace('inactive', 'active');
            popup.style.display = 'block';
            fetchAiReadme();
        } else {
            btn.classList.replace('active', 'inactive');
            popup.style.display = 'none';
        }
        fetchData(document.getElementById('searchInput').value);
    }

    async function fetchAiReadme() {
        const contentDiv = document.getElementById('ai-readme-content');
        try {
            const res = await fetch("https://raw.githubusercontent.com/Stormwindsky/OeuvreLibre/refs/heads/main/ArtLibre/ArtLibre/AI%20Creations/README.md");
            const text = await res.text();
            contentDiv.innerText = text;
        } catch (e) { contentDiv.innerText = "Error loading Readme."; }
    }

    function changeLanguage(lang) {
        const t = translations[lang] || translations.en;
        document.getElementById('txt-site-title').innerText = t.siteTitle;
        document.getElementById('searchInput').placeholder = t.searchPlh;
        document.getElementById('tab-files').innerText = t.tabFiles;
        document.getElementById('tab-images').innerText = t.tabImages;
        document.getElementById('tab-audios').innerText = t.tabAudios;
        document.getElementById('tab-videos').innerText = t.tabVideos;
        document.getElementById('txt-footer').innerText = t.footer;
        document.getElementById('cc0-text').innerText = t.cc0;
        document.getElementById('aiToggleBtn').innerText = t.aiBtn;
        
        localStorage.setItem('preferredLang', lang);
        updateThemeButtonText();
    }

    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateThemeButtonText();
    }

    function updateThemeButtonText() {
        const lang = localStorage.getItem('preferredLang') || 'en';
        const theme = localStorage.getItem('theme') || 'light';
        const t = translations[lang] || translations.en;
        document.getElementById('themeBtn').innerText = theme === 'dark' ? t.themeD : t.themeL;
    }

    async function fetchData(query = '') {
        const grid = document.getElementById('results-grid');
        grid.innerHTML = '<p>Loading...</p>';
        
        // Popup and Button Management
        const popup = document.getElementById('cc0-popup');
        const aiBtn = document.getElementById('aiToggleBtn');

        if(currentMode === 'files') {
            popup.style.display = 'none';
            aiBtn.style.display = 'none';
        } else {
            popup.style.display = 'block';
            aiBtn.style.display = 'block';
        }

        const api = (currentMode === 'files') 
            ? "https://api.github.com/repos/Stormwindsky/Stormwindsky-Website/git/trees/main?recursive=1"
            : "https://api.github.com/repos/Stormwindsky/ArtLibre/git/trees/main?recursive=1";

        try {
            const res = await fetch(api);
            const data = await res.json();
            let items = data.tree.filter(i => i.type === 'blob');

            if(currentMode === 'files') items = items.filter(i => i.path.endsWith('.html'));
            else if(currentMode === 'images') items = items.filter(i => i.path.match(/\.(jpg|jpeg|png|gif|svg|JPG)$/i));
            else if(currentMode === 'audios') items = items.filter(i => i.path.match(/\.(mp3|wav|ogg)$/i));
            else if(currentMode === 'videos') items = items.filter(i => i.path.match(/\.(mp4|webm)$/i));

            // Logic for AI filtering
            if (currentMode !== 'files') {
                if (!showAI) {
                    // Hide items in "AI Creations" folder if toggle is off
                    items = items.filter(i => !i.path.includes('AI Creations'));
                }
            }

            if(query) items = items.filter(i => i.path.toLowerCase().includes(query.toLowerCase()));

            renderGrid(items);
            updateURL();
        } catch(e) { grid.innerHTML = '<p>Error loading data.</p>'; }
    }

    function renderGrid(items) {
        const grid = document.getElementById('results-grid');
        grid.innerHTML = '';
        
        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'bento-card';
            const isAI = item.path.includes('AI Creations');
            
            const url = (currentMode === 'files') 
                ? `https://stormwindsky.com/${item.path}` 
                : RAW_BASE + item.path;
            
            let content = `<div><small style="opacity:0.5">${currentMode.toUpperCase()}</small><h3>${item.path.split('/').pop()}</h3>`;
            
            // Add AI Robot Badge if it's an AI creation
            if(isAI) {
                content += `<div class="ai-badge">🤖</div>`;
            }

            if(currentMode === 'images') content = `<img src="${url}" class="media-preview">` + content;
            if(currentMode === 'audios') content += `<audio controls style="width:100%"><source src="${url}"></audio>`;
            if(currentMode === 'videos') content = `<video controls class="media-preview"><source src="${url}"></video>` + content;

            card.innerHTML = content + `</div><a href="${url}" target="_blank" style="color:var(--blue-main); font-weight:bold; margin-top:15px; text-decoration:none;">Open Asset</a>`;
            grid.appendChild(card);
        });
    }

    // --- EVENTS ---
    document.getElementById('searchInput').addEventListener('input', (e) => fetchData(e.target.value));

    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentMode = tab.dataset.mode;
            fetchData(document.getElementById('searchInput').value);
        });
    });

    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const modeParam = urlParams.get('mode');
        const queryParam = urlParams.get('q');
        
        const savedTheme = localStorage.getItem('theme') || 'light';
        const savedLang = localStorage.getItem('preferredLang') || 'en';
        
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('langSelect').value = savedLang;
        changeLanguage(savedLang);

        if(modeParam) {
            currentMode = modeParam;
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.remove('active');
                if(t.dataset.mode === modeParam) t.classList.add('active');
            });
        }
        if(queryParam) {
            document.getElementById('searchInput').value = queryParam;
        }

        fetchData(queryParam || '');
    };
</script>

</body>
</html>
